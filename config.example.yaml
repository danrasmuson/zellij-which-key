# Example zellij-which-key config.
# Install to ~/.config/zellij-which-key/config.yaml

title: Leader

keys:

  # +---------------------------------------------------------+
  # | "open" submenu                                          |
  # +---------------------------------------------------------+
  o:
    label: open
    keys:
      # `run` -> the floating which-key pane *becomes* the command.
      # Best for full-screen TUIs that take over the pane.
      c:
        label: calendar
        run: calendar-tui

      # `pane` -> spawn the command in a NEW zellij pane via
      # `zellij action new-pane`, then close the which-key pane.
      l:
        label: lazygit (floating)
        pane:
          cmd: lazygit
          floating: true

      # `tab` -> open a new zellij tab. `cmd` is not supported yet (zellij
      # CLI limitation); use a layout file or follow with a `pane` action.
      t:
        label: terminal tab
        tab:
          name: scratch

  # +---------------------------------------------------------+
  # | zellij navigation via raw `zellij action` calls         |
  # +---------------------------------------------------------+
  z:
    label: zellij
    keys:
      d:
        label: detach
        zellij: [detach]
      n:
        label: next tab
        zellij: [go-to-next-tab]
      p:
        label: previous tab
        zellij: [go-to-previous-tab]
